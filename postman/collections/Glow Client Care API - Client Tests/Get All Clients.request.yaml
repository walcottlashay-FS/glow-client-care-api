$kind: http-request
name: Get All Clients
url: "{{baseUrl}}/clients"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", () => {
        pm.response.to.have.status(200);
      });

      pm.test("Response returns success true and an array", () => {
        let jsonData = pm.response.json();

        pm.expect(jsonData.success).to.eql(true);
        pm.expect(jsonData.data).to.be.an("array");
      });

      pm.test("Created client is found in the clients list", () => {
        let jsonData = pm.response.json();
        let clientId = pm.collectionVariables.get("clientId");

        let foundClient = jsonData.data.find((client) => client._id === clientId);

        pm.expect(foundClient).to.not.be.undefined;
        pm.expect(foundClient.email).to.eql(pm.collectionVariables.get("clientEmail"));
      });
    language: text/javascript
order: 1852889119197852
